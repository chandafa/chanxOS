# ┌─────────────────────────────────────────────────────────────────┐
# │  chanxOS 0.1 Alpha  ·  GRUB Boot Configuration                 │
# └─────────────────────────────────────────────────────────────────┘

set default=0
set timeout=8
set timeout_style=menu

# ── Graphics stack ────────────────────────────────────────────────
insmod all_video
insmod video_bochs
insmod video_cirrus
insmod gfxterm
insmod gfxmenu
insmod png
insmod part_gpt
insmod part_msdos

loadfont unicode
if [ x$feature_default_font_path = xy ]; then
  insmod font
fi

set gfxmode=auto
set gfxpayload=keep
terminal_output gfxterm

# ── Background & colors ───────────────────────────────────────────
if background_image /boot/grub/splash.png; then
  set color_normal=white/black
  set color_highlight=white/black
else
  set menu_color_normal=white/black
  set menu_color_highlight=cyan/black
fi

# ── Live params (reusable) ────────────────────────────────────────
set LIVE="boot=live components username=chanx hostname=chanxos user-fullname=chanxOS quiet splash plymouth.ignore-serial-consoles loglevel=3"

# ┌─────────────────────────────────────────────────────────────────┐
# │  BOOT MENU                                                      │
# └─────────────────────────────────────────────────────────────────┘

menuentry "  chanxOS  —  Live Session" --class chanxos --class gnu-linux --class os {
  echo "Memuat chanxOS Live..."
  linux  /live/vmlinuz $LIVE
  initrd /live/initrd.img
}

menuentry "  chanxOS  —  Safe Graphics" --class chanxos {
  echo "Memuat chanxOS (mode grafis aman)..."
  linux  /live/vmlinuz boot=live components username=chanx hostname=chanxos user-fullname=chanxOS nomodeset vga=normal quiet splash
  initrd /live/initrd.img
}

menuentry "  Pasang chanxOS ke Disk" --class installer {
  echo "Memuat installer chanxOS..."
  linux  /install/vmlinuz priority=low $LIVE
  initrd /install/initrd.gz
}

menuentry "  Pasang chanxOS  (Mode Teks)" --class installer {
  linux  /install/vmlinuz priority=low
  initrd /install/initrd.gz
}

menuentry "  Boot dari Hard Disk" --class hdd {
  set root=(hd0)
  chainloader +1
}

menuentry "  Pengaturan Firmware UEFI" --class settings {
  fwsetup
}
