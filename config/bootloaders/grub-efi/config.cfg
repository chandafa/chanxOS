set default=0
set timeout=5
set timeout_style=menu
insmod all_video
insmod gfxterm
insmod png
terminal_output gfxterm

if background_image /boot/grub/splash.png; then
  set color_normal=black/black
  set color_highlight=white/light-blue
fi

menuentry "Live chanxOS" {
    linux /live/vmlinuz boot=live components username=chanx hostname=chanxos quiet splash
    initrd /live/initrd.img
}

menuentry "Live chanxOS (safe graphics)" {
    linux /live/vmlinuz boot=live components username=chanx hostname=chanxos nomodeset
    initrd /live/initrd.img
}

menuentry "Install chanxOS" {
    linux /install/vmlinuz vga=788 theme=dark
    initrd /install/initrd.gz
}

menuentry "Boot from next volume" {
    exit
}
