# chanxOS GRUB Boot Configuration
# ================================

set default=0
set timeout=8
set timeout_style=menu

# Load graphics modules
insmod all_video
insmod video_bochs
insmod video_cirrus
insmod gfxterm
insmod gfxmenu
insmod png
insmod part_gpt
insmod part_msdos

# Enable graphical terminal
if [ x$feature_default_font_path = xy ]; then
  insmod font
fi

terminal_output gfxterm

# Set graphical resolution
if [ x$feature_all_video_module = xy ]; then
  insmod all_video
fi
set gfxmode=auto
set gfxpayload=keep

# Load background splash
if background_image /boot/grub/splash.png; then
  set color_normal=white/black
  set color_highlight=black/light-cyan
else
  set menu_color_normal=white/black
  set menu_color_highlight=cyan/black
fi

# ─────────────────────────────────────────────
#  chanxOS Boot Menu
# ─────────────────────────────────────────────

menuentry " ▶  Live chanxOS" --class chanxos --class gnu-linux --class os {
  echo "   Loading chanxOS live system..."
  linux  /live/vmlinuz boot=live components username=chanx hostname=chanxos quiet splash plymouth.ignore-serial-consoles
  initrd /live/initrd.img
}

menuentry " ▶  Live chanxOS  [Safe Graphics]" --class chanxos --class gnu-linux {
  echo "   Loading chanxOS (safe graphics mode)..."
  linux  /live/vmlinuz boot=live components username=chanx hostname=chanxos nomodeset vga=normal
  initrd /live/initrd.img
}

menuentry " ⚙  Install chanxOS" --class chanxos --class installer {
  echo "   Loading chanxOS installer..."
  linux  /install/vmlinuz priority=low quiet splash ---
  initrd /install/initrd.gz
}

menuentry " ⚙  Install chanxOS  [Text Mode]" --class chanxos --class installer {
  linux  /install/vmlinuz priority=low ---
  initrd /install/initrd.gz
}

menuentry " ↩  Boot from Hard Disk" --class hdd {
  set root=(hd0)
  chainloader +1
}

menuentry " ☰  UEFI Firmware Settings" --class settings {
  fwsetup
}
