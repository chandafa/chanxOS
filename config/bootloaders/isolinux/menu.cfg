menu hshift 8
menu width 58
menu margin 2
menu rows 5
menu vshift 12
menu timeoutrow 20
menu helpmsgrow 22
menu tabmsgrow 23
include stdmenu.cfg

label live
  menu label ^Live chanxOS
  linux /live/vmlinuz
  initrd /live/initrd.img
  append boot=live components username=chanx hostname=chanxos quiet splash ---

label live-safe
  menu label Live chanxOS (^safe graphics)
  linux /live/vmlinuz
  initrd /live/initrd.img
  append boot=live components username=chanx hostname=chanxos nomodeset ---

label local
  menu label Boot from local ^drive
  localboot 0xffff
