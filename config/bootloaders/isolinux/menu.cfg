menu hshift 9
menu width 66
menu margin 2
menu rows 8
menu vshift 9
menu timeoutrow 17
menu helpmsgrow 19
menu tabmsgrow 21
menu cmdlinerow 21
include stdmenu.cfg

label live
  menu label ^Live chanxOS
  linux /live/vmlinuz
  initrd /live/initrd.img
  append boot=live components username=chanx hostname=chanxos quiet splash ---

label live-safe
  menu label Live chanxOS (^safe graphics)
  linux /live/vmlinuz
  initrd /live/initrd.img
  append boot=live components username=chanx hostname=chanxos nomodeset ---

label installer
  menu label ^Install chanxOS
  linux /install/vmlinuz
  initrd /install/initrd.gz
  append vga=788 theme=dark ---

label local
  menu label Boot from local ^drive
  localboot 0xffff
