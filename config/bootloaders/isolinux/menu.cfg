menu hshift 10
menu width 62
menu margin 2
menu rows 7
menu vshift 10
menu timeoutrow 18
menu helpmsgrow 20
menu tabmsgrow 22
include stdmenu.cfg

label live
  menu label ^Live chanxOS
  linux /live/vmlinuz
  initrd /live/initrd.img
  append boot=live components username=chanx hostname=chanxos quiet splash ---

label live-safe
  menu label Live chanxOS (^safe graphics)
  linux /live/vmlinuz
  initrd /live/initrd.img
  append boot=live components username=chanx hostname=chanxos nomodeset ---

label install
  menu label ^Install chanxOS
  linux /install/vmlinuz
  append vga=788 initrd=/install/initrd.gz --- quiet

label local
  menu label Boot from local ^drive
  localboot 0xffff
