# chanxOS ISOLINUX Color Theme
# =============================
# Warna menggunakan format: foreground/background
# Nilai: #AARRGGBB  (AA = alpha: 00=transparan, FF=solid)

# Border / frame luar menu — transparan
menu color border       30;44      #00000000  #00000000  none

# Judul menu (baris atas)
menu color title        1;36;44    #FF00D4FF  #00000000  std

# Entri terpilih (highlight biru transparan)
menu color sel          7;37;40    #FFFFFFFF  #AA1A6EAA  all

# Entri tidak terpilih
menu color unsel        37;44      #FFCCDDEE  #00000000  std

# Hotkey terpilih
menu color hotsel       1;36;40    #FF00FFFF  #AA1A6EAA  all

# Hotkey tidak terpilih
menu color hotkey       1;36;44    #FF00D4FF  #00000000  std

# Pesan timeout
menu color timeout_msg  37;44      #FFAABBCC  #00000000  std

# Angka countdown timeout
menu color timeout      1;36;44    #FF00D4FF  #00000000  std

# Pesan bantuan (baris bawah)
menu color msg07        37;44      #FF8899AA  #00000000  std

# Baris Tab
menu color tabmsg       31;40      #FF667788  #00000000  std

# Garis horisontal pemisah
menu color cmdmark      1;36;44    #FF00D4FF  #00000000  std
menu color cmdline      37;40      #FFFFFFFF  #00000000  std
