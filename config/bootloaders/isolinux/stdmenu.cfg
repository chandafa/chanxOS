# chanxOS ISOLINUX — Color Scheme
# Format: attribute fg/bg  #AARRGGBB(fg) #AARRGGBB(bg) effect
#
# Palette: deep navy bg + white text + cyan accent

# Frame / border (invisible — fully transparent)
menu color border        30;44   #00000000  #00000000  none

# Header title row
menu color title         1;37    #FFE8F4FF  #00000000  std

# Selected item (highlight) — deep navy solid
menu color sel           7;37    #FFFFFFFF  #BB0A1A30  all

# Unselected items
menu color unsel         37      #FFCCDDE8  #00000000  std

# Hotkey in selected row
menu color hotsel        1;36    #FF7FE0FF  #BB0A1A30  all

# Hotkey in unselected row
menu color hotkey        1;36    #FF5AC8F0  #00000000  std

# Countdown timer number
menu color timeout       1;36    #FF5AC8F0  #00000000  std

# Timeout message text
menu color timeout_msg   37      #FF8899BB  #00000000  std

# Tab hint / help text
menu color tabmsg        37      #FF667799  #00000000  std

# Separator line (divider)
menu color cmdmark       1;36    #FF5AC8F0  #00000000  std

# Command line
menu color cmdline       37      #FFFFFFFF  #00000000  std

# Message line
menu color msg07         37      #FF8899BB  #00000000  std
