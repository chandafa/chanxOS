# chanxOS Picom SAFE Config (xrender fallback for VMs / old GPUs)
backend = "xrender";
vsync = false;
shadow = true;
shadow-radius = 14;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.18;
shadow-color = "#0a1a2e";
shadow-exclude = [
  "class_g = 'Plank'",
  "class_g = 'Xfce4-panel'",
  "window_type = 'desktop'",
  "window_type = 'dock'"
];
corner-radius = 10;
rounded-corners-exclude = [
  "window_type = 'desktop'",
  "window_type = 'dock'",
  "class_g = 'Xfce4-panel'",
  "class_g = 'Plank'"
];
inactive-opacity = 0.97;
active-opacity = 1.0;
frame-opacity = 0.92;
fading = true;
fade-in-step = 0.07;
fade-out-step = 0.07;
mark-wmwin-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
log-level = "warn";
