backend = "xrender";
vsync = false;
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.16;
corner-radius = 12;
inactive-opacity = 0.98;
active-opacity = 1.0;
frame-opacity = 0.92;
rounded-corners-exclude = [
  "class_g = 'Xfce4-panel'",
  "class_g = 'Plank'",
  "window_type = 'desktop'"
];
opacity-rule = [
  "96:class_g = 'Xfce4-terminal'",
  "96:class_g = 'Thunar'",
  "90:class_g = 'Plank'"
];
