# chanxOS Picom Compositor Configuration
# =========================================
# Liquid glass effect: blur, shadows, rounded corners, transparency

# ── Backend ──────────────────────────────────────────────────────────────────
# glx = hardware accelerated (best quality)
# xrender = CPU fallback (safe for VMs / older hardware)
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
use-damage = true;

# ── VSync ────────────────────────────────────────────────────────────────────
vsync = true;

# ── Shadows ──────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 20;
shadow-offset-x = -12;
shadow-offset-y = -10;
shadow-opacity = 0.22;
shadow-color = "#0a1a2e";
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'Plank'",
  "class_g = 'Xfce4-panel'",
  "_GTK_FRAME_EXTENTS@:c",
  "window_type = 'desktop'",
  "window_type = 'dock'",
  "window_type = 'dnd'"
];

# ── Blur (frosted glass effect) ──────────────────────────────────────────────
blur-method = "dual_kawase";
blur-strength = 6;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;
blur-kern = "3x3box";
blur-exclude = [
  "window_type = 'desktop'",
  "window_type = 'dock'",
  "class_g = 'Plank'",
  "_GTK_FRAME_EXTENTS@:c"
];

# ── Rounded Corners ──────────────────────────────────────────────────────────
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'desktop'",
  "window_type = 'dock'",
  "class_g = 'Xfce4-panel'",
  "class_g = 'Plank'"
];

# ── Opacity ──────────────────────────────────────────────────────────────────
inactive-opacity = 0.96;
active-opacity = 1.0;
frame-opacity = 0.90;
inactive-opacity-override = false;

opacity-rule = [
  "95:class_g = 'Xfce4-terminal'",
  "97:class_g = 'Thunar'",
  "97:class_g = 'Mousepad'",
  "97:class_g = 'Ristretto'",
  "88:class_g = 'Xfce4-panel'",
  "92:class_g = 'Xfdesktop'"
];

# ── Fading ───────────────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 5;
fade-exclude = [
  "window_type = 'tooltip'"
];

# ── Focus ────────────────────────────────────────────────────────────────────
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

# ── Logging ──────────────────────────────────────────────────────────────────
log-level = "warn";
